                  - { label: "Secondary marginalia", name: marginaliaSecondary, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Heading (text after italic)", name: headingTail, widget: string, required: false }
                  - { label: "Body", name: body, widget: markdown, buttons: ['bold', 'italic', 'link'] }

