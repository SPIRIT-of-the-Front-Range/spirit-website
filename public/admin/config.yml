        name: kind
        widget: select
        options: ['essay', 'talk', 'article', 'paper', 'interview']
        default: 'essay'
      - { label: "External URL", name: url, widget: string, required: false, hint: "If set, the entry links out (Substack, OpenCivics, etc.). Leave blank to publish the body on this site." }
      - { label: "Publication name", name: publication, widget: string, required: false, hint: "e.g. 'omniharmonic', 'OpenCivics Labs'" }
      - label: "Accent tone"
        name: tone
        widget: select
        options: ['clay', 'creek', 'sage', 'grass']
        default: 'clay'
      - { label: "Featured?", name: featured, widget: boolean, default: false, hint: "Featured entries appear at the top of the page in large cards." }
      - { label: "Display order", name: order, widget: number, default: 99, hint: "Lower numbers display first within their group." }
      - label: "Tags"
        name: tags
        widget: list
        required: false
        field: { label: "Tag", name: tag, widget: string }
      - { label: "Excerpt (1-3 sentences)", name: excerpt, widget: text, hint: "Shown on the index page card and as the detail page subtitle." }
      - label: "Body (if publishing on-site)"
        name: body
        widget: markdown
        required: false
        hint: "Full essay text. Only used if External URL is blank."

  # --- CATALOG (the WEC-style index) -----------------------------
  - name: catalog
    label: "Catalog Entries"
    label_singular: "Catalog Entry"
    folder: "src/content/catalog"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: title
    summary: "[{{kind}}] {{title}}"
    sortable_fields: ['order', 'title', 'kind']
    fields:
      - { label: "Title", name: title, widget: string }
      - label: "Kind"
        name: kind
        widget: select
        options: ['book', 'organization', 'tool', 'practice', 'place', 'podcast', 'essay']
      - { label: "Author / By", name: author, widget: string, required: false }
      - { label: "Source / Publisher", name: source, widget: string, required: false, hint: "e.g. 'Cambridge University Press · 1990'" }
      - { label: "URL", name: url, widget: string, required: false }
      - { label: "Price", name: price, widget: string, required: false, hint: "e.g. '$28', 'Free', 'Open'" }
      - { label: "Year", name: year, widget: string, required: false }
      - label: "Pillars"
        name: pillars
        widget: select
        multiple: true
        required: false
        options: ['allocation', 'coordination', 'belonging', 'culturing']
      - { label: "Curator", name: curator, widget: string, required: false, hint: "Who recommends this?" }
      - label: "Color tone"
        name: tone
        widget: select
        options: ['clay', 'creek', 'sage', 'grass']
        default: 'clay'
      - { label: "Display order", name: order, widget: number, default: 99 }
      - label: "Curator's note"
        name: body
        widget: markdown
        hint: "Why does this belong in the catalog?"
