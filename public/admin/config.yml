              - { label: "Plate caption", name: plateCaption, widget: string, required: false }
              - label: "Photo treatment"
                name: treatment
                widget: select
                options: ['natural', 'duotone-sage', 'duotone-clay', 'duotone-creek', 'duotone-clay-deep', 'duotone-ink']
                default: 'duotone-clay-deep'
              - { label: "Brightness (0.4–1.0)", name: brightness, widget: number, value_type: float, min: 0.4, max: 1.0, step: 0.05, default: 0.62 }
