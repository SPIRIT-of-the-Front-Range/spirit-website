# Decap CMS configuration
# https://decapcms.org/docs/configuration-options/
#
# To edit content:
#   LOCAL DEV: run `npm run cms` in another terminal — Decap connects via local proxy, no auth needed
#   PRODUCTION: requires GitHub OAuth App + proxy (see EDITOR-GUIDE.md)

# Local dev mode — connects to decap-server proxy (run via `npm run cms`)
local_backend: true

backend:
  name: github
  repo: SPIRIT-of-the-Front-Range/spirit-website
  branch: main
  base_url: https://spirit-decap-oauth.benjamin-7c2.workers.dev
  auth_endpoint: /auth

# Where uploaded images live — broadened to cover all of /images so the CMS
# media library can browse existing photos in community/, programs/, etc.
# New editor uploads go to the root of this folder.
media_folder: "public/images"
public_folder: "/images"

# Editorial workflow (creates PRs instead of direct commits)
publish_mode: editorial_workflow

# Site URL for "View Live" links
site_url: https://spiritofthefrontrange.org
display_url: https://spiritofthefrontrange.org
logo_url: /favicon.svg

# Locale
locale: 'en'

collections:

  # --- SITE SETTINGS (header / footer / nav / donate URL) --------
  # Affects every page. Edit cautiously.
  - name: settings
    label: "Site settings"
    label_singular: "Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: site
        label: "Site settings"
        file: "src/content/settings/site.md"
        fields:
          - { label: "Site name", name: siteName, widget: string, hint: "Appears in masthead, footer, copyright" }
          - { label: "Issue number", name: issueNumber, widget: string, default: "No. 01" }
          - { label: "Established year", name: establishedYear, widget: string, default: "est. 2026" }
          - { label: "Wordmark image", name: wordmarkSrc, widget: image, hint: "The hand-drawn nameplate logo in the header" }

          - label: "Header"
            name: header
            widget: object
            fields:
              - { label: "Desktop donate button label", name: donateLabel, widget: string, default: "✦ Fund" }
              - { label: "Mobile donate label (in menu)", name: mobileDonateLabel, widget: string, default: "✦ Fund the Bioregion" }
              - label: "Primary nav"
                name: nav
                widget: list
                fields:
                  - { label: "Label", name: label, widget: string }
                  - { label: "Link", name: href, widget: string, hint: "Relative path like 'mission/'" }

          - label: "Footer"
            name: footer
            widget: object
            fields:
              - label: "Tagline"
                name: tagline
                widget: object
                fields:
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Body", name: body, widget: string }
              - { label: "Primary CTA label", name: primaryCtaLabel, widget: string }
              - { label: "Primary CTA link", name: primaryCtaHref, widget: string }
              - { label: "Secondary CTA label", name: secondaryCtaLabel, widget: string }
              - { label: "Secondary CTA link", name: secondaryCtaHref, widget: string }
              - { label: "Site column title", name: siteColumnTitle, widget: string, default: "Site" }
              - label: "Site column links"
                name: siteLinks
                widget: list
                fields:
                  - { label: "Label", name: label, widget: string }
                  - { label: "Link", name: href, widget: string }
              - { label: "Reach-us column title", name: reachUsTitle, widget: string, default: "Reach us" }
              - { label: "Contact email", name: email, widget: string }
              - label: "External links (podcast, FRC, etc.)"
                name: externalLinks
                widget: list
                fields:
                  - { label: "Label", name: label, widget: string }
                  - { label: "Link", name: href, widget: string, hint: "Full https:// URL" }
              - { label: "Editor sign-in label", name: editorSignInLabel, widget: string, default: "Editor sign-in" }
              - { label: "Colophon", name: colophon, widget: string }
              - { label: "Copyright suffix", name: copyrightSuffix, widget: string }

          - label: "Donation"
            name: donation
            widget: object
            fields:
              - { label: "Every.org URL", name: url, widget: string, hint: "Full donation URL with all parameters" }
              - { label: "Donation flow is live", name: ready, widget: boolean, hint: "When OFF, donate page shows a fallback contact card instead of the Every.org button" }

  # --- PAGES (singleton files per page) --------------------------
  # Each page has a fixed set of slots. Editors fill content into
  # slots — they cannot add new spreads or change layout. Treatments
  # and colors are constrained to closed lists.
  - name: pages
    label: "Pages"
    label_singular: "Page"
    delete: false
    editor:
      preview: false
    files:
      - name: mission
        label: "Mission"
        file: "src/content/pages/mission.md"
        fields:
          - label: "SEO"
            name: seo
            widget: object
            collapsed: true
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: description, widget: text }

          - label: "Cover"
            name: cover
            widget: object
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Title (first part)", name: title, widget: string, hint: "Plain text portion of the page title" }
              - { label: "Title (italic accent)", name: italicTitle, widget: string, hint: "Italic colored words that close the title" }
              - { label: "Subtitle", name: subtitle, widget: text }
              - { label: "Cover image", name: imageSrc, widget: image }
              - { label: "Image alt text", name: imageAlt, widget: string }
              - { label: "Plate caption", name: plateCaption, widget: string, required: false }
              - label: "Photo treatment"
                name: treatment
                widget: select
                options: ['natural', 'duotone-sage', 'duotone-clay', 'duotone-creek', 'duotone-clay-deep', 'duotone-ink']
                default: 'duotone-sage'
              - { label: "Brightness (0.4–1.0)", name: brightness, widget: number, value_type: float, min: 0.4, max: 1.0, step: 0.05, default: 0.75 }

          - label: "Spreads"
            name: spreads
            widget: object
            fields:

              - label: "Vision spread"
                name: vision
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string, default: "Vision" }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Marginalia (sidebar note)", name: marginalia, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Body", name: body, widget: markdown, buttons: ['bold', 'italic', 'link', 'heading-three'] }
                  - { label: "Image", name: image, widget: image }
                  - { label: "Image alt text", name: imageAlt, widget: string }
                  - { label: "Image caption", name: imageCaption, widget: string }

              - label: "Mission spread"
                name: mission
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string, default: "Mission" }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Marginalia (sidebar note)", name: marginalia, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Body", name: body, widget: markdown, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Italic closing note", name: italicNote, widget: text, required: false, hint: "Optional italic-styled paragraph rendered after the body, in section color" }
                  - { label: "Image", name: image, widget: image }
                  - { label: "Image alt text", name: imageAlt, widget: string }
                  - { label: "Image caption", name: imageCaption, widget: string }

              - label: "Strategy spread"
                name: strategy
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string, default: "Strategy" }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Marginalia (sidebar note)", name: marginalia, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Intro paragraph", name: intro, widget: text }
                  - { label: "Pillar diagram caption", name: weaveCaption, widget: string }
                  - label: "Pillars (four)"
                    name: pillars
                    widget: list
                    min: 4
                    max: 4
                    fields:
                      - { label: "Number", name: number, widget: string, hint: "e.g. '01'" }
                      - label: "Accent color"
                        name: color
                        widget: select
                        options: ['clay', 'creek', 'sage', 'grass']
                      - { label: "Title", name: title, widget: string }
                      - { label: "Body", name: body, widget: text }

              - label: "Commitments spread"
                name: commitments
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string, default: "Commitments" }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading", name: heading, widget: string }
                  - label: "Commitments (three)"
                    name: items
                    widget: list
                    min: 3
                    max: 3
                    fields:
                      - { label: "Number", name: number, widget: string }
                      - label: "Accent color"
                        name: color
                        widget: select
                        options: ['clay', 'creek', 'sage', 'grass']
                      - { label: "Title", name: title, widget: string }
                      - { label: "Body", name: body, widget: text }

          - label: "Pull quote"
            name: pullQuote
            widget: object
            collapsed: true
            required: false
            fields:
              - { label: "Quote", name: text, widget: text }
              - { label: "Attribution", name: attribution, widget: string }

          - label: "Closing CTA"
            name: closing
            widget: object
            collapsed: true
            required: false
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Quote", name: text, widget: text }
              - { label: "Button label", name: ctaLabel, widget: string }
              - { label: "Button link", name: ctaHref, widget: string, hint: "Relative path, e.g. 'the-commons/'" }

      # --- CONNECT page -------------------------------------------
      - name: connect
        label: "Connect"
        file: "src/content/pages/connect.md"
        fields:
          - label: "SEO"
            name: seo
