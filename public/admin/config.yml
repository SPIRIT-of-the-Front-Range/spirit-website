# Decap CMS configuration
# https://decapcms.org/docs/configuration-options/
#
# To edit content:
#   LOCAL DEV: run `npm run cms` in another terminal — Decap connects via local proxy, no auth needed
#   PRODUCTION: requires GitHub OAuth App + proxy (see EDITOR-GUIDE.md)

# Local dev mode — connects to decap-server proxy (run via `npm run cms`)
local_backend: true

backend:
  name: github
  repo: SPIRIT-of-the-Front-Range/spirit-website
  branch: main
  base_url: https://spirit-decap-oauth.benjamin-7c2.workers.dev
  auth_endpoint: /auth

# Where uploaded images live
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Editorial workflow (creates PRs instead of direct commits)
publish_mode: editorial_workflow

# Site URL for "View Live" links
site_url: https://spiritofthefrontrange.org
display_url: https://spiritofthefrontrange.org
logo_url: /favicon.svg

# Locale
locale: 'en'

collections:

  # --- PAGES (one entry per route, edits live site copy) ---------
  - name: pages
    label: "Pages"
    label_singular: "Page"
    editor: { preview: false }
    files:
      - name: mission
        label: "Mission page"
        file: "src/content/pages/mission.md"
        description: "Vision · Mission · Strategy · Commitments. Bodies use Markdown (bold/italic OK)."
        fields:
          - { label: "Browser tab title", name: title, widget: string }
          - { label: "Meta description", name: description, widget: text, hint: "Shown in search results / link previews" }

          - label: "Cover"
            name: cover
            widget: object
            collapsed: true
            fields:
              - { label: "Folio number", name: folio, widget: string, hint: "e.g. '02'" }
              - { label: "Section label", name: sectionLabel, widget: string }
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Title (first part)", name: title, widget: string }
              - { label: "Title (italic part)", name: italicTitle, widget: string, required: false }
              - { label: "Subtitle", name: subtitle, widget: text }
              - { label: "Image", name: image, widget: image }
              - { label: "Image alt text", name: imageAlt, widget: string }
              - { label: "Plate caption", name: plateCaption, widget: string, required: false }
              - label: "Treatment"
                name: treatment
                widget: select
                required: false
                options: ['warm', 'cool', 'duotone-sage', 'duotone-creek', 'duotone-clay']
                default: 'duotone-sage'
              - { label: "Brightness (0–1)", name: brightness, widget: number, required: false, value_type: float, min: 0, max: 1, step: 0.05, default: 0.75 }

          - label: "Vision spread"
            name: vision
            widget: object
            collapsed: true
            fields:
              - { label: "Folio", name: folio, widget: string }
              - { label: "Folio numeral (e.g. 02.i)", name: folioNum, widget: string }
              - { label: "Marginalia number", name: marginaliaNumber, widget: string }
              - { label: "Marginalia label", name: marginaliaLabel, widget: string }
              - { label: "Marginalia body", name: marginaliaBody, widget: text }
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Headline", name: headline, widget: string }
              - { label: "Headline (italic part)", name: italicHeadline, widget: string, required: false }
              - { label: "Body (Markdown)", name: body, widget: markdown }
              - { label: "Image", name: image, widget: image }
              - { label: "Image alt text", name: imageAlt, widget: string }
              - { label: "Image caption", name: imageCaption, widget: string, required: false }

          - label: "Mission spread"
            name: mission
            widget: object
            collapsed: true
            fields:
              - { label: "Folio", name: folio, widget: string }
              - { label: "Folio numeral", name: folioNum, widget: string }
              - { label: "Marginalia number", name: marginaliaNumber, widget: string }
              - { label: "Marginalia label", name: marginaliaLabel, widget: string }
              - { label: "Marginalia body", name: marginaliaBody, widget: text }
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Headline", name: headline, widget: string }
              - { label: "Headline (italic part)", name: italicHeadline, widget: string, required: false }
              - { label: "Body (Markdown)", name: body, widget: markdown }
              - { label: "Image", name: image, widget: image }
              - { label: "Image alt text", name: imageAlt, widget: string }
              - { label: "Image caption", name: imageCaption, widget: string, required: false }

          - label: "Pull quote"
            name: pullQuote
            widget: object
            collapsed: true
            fields:
              - { label: "Quote text", name: text, widget: text }
              - { label: "Attribution", name: attribution, widget: string, required: false }

          - label: "Strategy spread"
            name: strategy
            widget: object
            collapsed: true
            fields:
              - { label: "Folio", name: folio, widget: string }
              - { label: "Folio numeral", name: folioNum, widget: string }
              - { label: "Marginalia number", name: marginaliaNumber, widget: string }
              - { label: "Marginalia label", name: marginaliaLabel, widget: string }
              - { label: "Marginalia body", name: marginaliaBody, widget: text }
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Headline", name: headline, widget: string }
              - { label: "Headline (italic part)", name: italicHeadline, widget: string, required: false }
              - { label: "Lead paragraph", name: lead, widget: text }
              - { label: "Pillar-weave caption", name: pillarWeaveCaption, widget: string, required: false }
              - label: "Pillars (4)"
                name: pillars
                widget: list
                min: 4
                max: 4
                fields:
                  - { label: "Number", name: number, widget: string }
                  - label: "Tone"
                    name: tone
                    widget: select
                    options: ['clay', 'creek', 'sage', 'grass']
                  - { label: "Label", name: label, widget: string }
                  - { label: "Body", name: body, widget: text }

          - label: "Commitments triptych"
            name: commitments
            widget: object
            collapsed: true
            fields:
              - { label: "Folio", name: folio, widget: string, required: false }
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Headline", name: headline, widget: string }
              - label: "Items"
                name: items
                widget: list
                fields:
                  - { label: "Number", name: number, widget: string }
                  - label: "Tone"
                    name: tone
                    widget: select
                    options: ['clay', 'creek', 'sage', 'grass']
                  - { label: "Title", name: title, widget: string }
                  - { label: "Body", name: body, widget: text }

          - label: "Closing"
            name: closing
            widget: object
            collapsed: true
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Italic text", name: text, widget: string }
              - { label: "CTA button label", name: ctaLabel, widget: string }
              - { label: "CTA URL (relative path or full URL)", name: ctaUrl, widget: string }

  # --- STEWARDS (team members) -----------------------------------
  - name: stewards
    label: "Stewards (Team)"
    label_singular: "Steward"
    folder: "src/content/stewards"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: name
    summary: "{{name}} — {{role}}"
    sortable_fields: ['order', 'name']
    fields:
      - { label: "Name", name: name, widget: string }
      - { label: "Role / Title", name: role, widget: string, hint: "e.g. 'Stewarding Director · Legal Representative'" }
      - { label: "Email", name: email, widget: string, required: false }
      - { label: "Pronouns", name: pronouns, widget: string, required: false }
      - { label: "Photo", name: photo, widget: image, required: false }
      - { label: "Display order", name: order, widget: number, default: 99, hint: "Lower numbers display first" }
      - label: "Bio (long)"
        name: body
        widget: markdown
        hint: "Rich text — appears on the steward's card"

  # --- PROGRAMS --------------------------------------------------
  - name: programs
    label: "Programs"
    label_singular: "Program"
    folder: "src/content/programs"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{status}}"
    sortable_fields: ['order', 'title', 'status']
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Abbreviation", name: abbrev, widget: string, required: false, hint: "e.g. 'CTI'" }
      - label: "Pillar"
        name: pillar
        widget: select
        required: false
        options: ['allocation', 'coordination', 'belonging', 'culturing']
      - { label: "Pillar label", name: pillarLabel, widget: string, required: false, hint: "Display name for the pillar" }
      - { label: "Short description", name: shortDescription, widget: text, hint: "1-2 sentences for cards & summaries" }
      - label: "Status"
        name: status
        widget: select
        options: ['active', 'upcoming', 'concluded']
        default: 'active'
      - { label: "Display order", name: order, widget: number, default: 99 }
      - { label: "Next event date", name: nextEventDate, widget: string, required: false }
      - { label: "Next event URL", name: nextEventUrl, widget: string, required: false }
      - label: "Description (long)"
        name: body
        widget: markdown

  # --- CATALOG (the WEC-style index) -----------------------------
  - name: catalog
    label: "Catalog Entries"
    label_singular: "Catalog Entry"
    folder: "src/content/catalog"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: title
    summary: "[{{kind}}] {{title}}"
    sortable_fields: ['order', 'title', 'kind']
    fields:
      - { label: "Title", name: title, widget: string }
      - label: "Kind"
        name: kind
        widget: select
        options: ['book', 'organization', 'tool', 'practice', 'place', 'podcast', 'essay']
      - { label: "Author / By", name: author, widget: string, required: false }
      - { label: "Source / Publisher", name: source, widget: string, required: false, hint: "e.g. 'Cambridge University Press · 1990'" }
      - { label: "URL", name: url, widget: string, required: false }
      - { label: "Price", name: price, widget: string, required: false, hint: "e.g. '$28', 'Free', 'Open'" }
      - { label: "Year", name: year, widget: string, required: false }
      - label: "Pillars"
        name: pillars
        widget: select
        multiple: true
        required: false
        options: ['allocation', 'coordination', 'belonging', 'culturing']
      - { label: "Curator", name: curator, widget: string, required: false, hint: "Who recommends this?" }
      - label: "Color tone"
        name: tone
        widget: select
        options: ['clay', 'creek', 'sage', 'grass']
        default: 'clay'
      - { label: "Display order", name: order, widget: number, default: 99 }
      - label: "Curator's note"
        name: body
        widget: markdown
        hint: "Why does this belong in the catalog?"
