  # --- STEWARDS (team members) -----------------------------------
  - name: stewards
    label: "Stewards (Team)"
    label_singular: "Steward"
    folder: "src/content/stewards"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: name
    summary: "{{name}} — {{role}}"
    sortable_fields: ['order', 'name']
    fields:
      - { label: "Name", name: name, widget: string }
      - { label: "Role / Title", name: role, widget: string, hint: "e.g. 'Stewarding Director · Legal Representative'" }
      - { label: "Email", name: email, widget: string, required: false }
      - { label: "Personal website / project URL", name: website, widget: string, required: false, hint: "Full URL including https://" }
      - { label: "Website label (optional)", name: websiteLabel, widget: string, required: false, hint: "Leave blank to auto-display the domain." }
      - { label: "Pronouns", name: pronouns, widget: string, required: false }
      - { label: "Photo", name: photo, widget: image, required: false }
      - { label: "Display order", name: order, widget: number, default: 99, hint: "Lower numbers display first" }
      - label: "Bio (long)"
        name: body
        widget: markdown
        hint: "Rich text — appears on the steward's card"

  # --- PROGRAMS --------------------------------------------------
  - name: programs
    label: "Programs"
    label_singular: "Program"
    folder: "src/content/programs"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{status}}"
    sortable_fields: ['order', 'title', 'status']
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Abbreviation", name: abbrev, widget: string, required: false, hint: "e.g. 'CTI'" }
      - label: "Pillar"
        name: pillar
        widget: select
        required: false
        options: ['allocation', 'coordination', 'belonging', 'culturing']
      - { label: "Pillar label", name: pillarLabel, widget: string, required: false, hint: "Display name for the pillar" }
      - { label: "Short description", name: shortDescription, widget: text, hint: "1-2 sentences for cards & summaries" }
      - label: "Status"
        name: status
        widget: select
        options: ['active', 'upcoming', 'concluded']
        default: 'active'
      - { label: "Display order", name: order, widget: number, default: 99 }
      - { label: "Next event date", name: nextEventDate, widget: string, required: false }
      - { label: "Next event URL", name: nextEventUrl, widget: string, required: false }
      - label: "Description (long — shown as intro on detail page)"
        name: body
        widget: markdown

      # --- DETAIL PAGE — drives /programs/{slug}/ ---------------
      - label: "Detail page"
        name: detail
        widget: object
        required: false
        collapsed: true
        hint: "Optional. Provides cover image + structured body sections + signup CTA for the program's own /programs/{slug}/ page. Leave blank to use defaults."
        fields:
          - { label: "Tagline (italic subtitle on cover)", name: tagline, widget: string, required: false }
          - { label: "Hero image", name: heroImage, widget: image, required: false }
          - { label: "Hero image alt text", name: heroAlt, widget: string, required: false }
          - label: "Hero photo treatment"
            name: heroTreatment
            widget: select
            required: false
            options: ['natural', 'duotone-sage', 'duotone-clay', 'duotone-creek', 'duotone-clay-deep', 'duotone-ink']
          - { label: "Hero brightness (0.4–1.0)", name: heroBrightness, widget: number, value_type: float, min: 0.4, max: 1.0, step: 0.05, required: false }
          - { label: "Hero plate caption", name: heroPlateCaption, widget: string, required: false }
          - label: "Accent tone"
            name: tone
            widget: select
            required: false
            options: ['clay', 'creek', 'sage', 'grass']

          - label: "Body sections"
            name: sections
            widget: list
            required: false
            hint: "Structured longform — each section renders as a numbered article."
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string, required: false }
              - { label: "Heading (first part)", name: heading, widget: string }
              - { label: "Heading (italic accent)", name: italicHeading, widget: string, required: false }
              - { label: "Body (markdown)", name: body, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }

          - label: "Pull quote"
            name: pullQuote
            widget: object
            required: false
            fields:
              - { label: "Quote", name: text, widget: text }
              - { label: "Attribution", name: attribution, widget: string, required: false }

          - label: "Signup / application CTA"
            name: signup
            widget: object
            required: false
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string }
              - { label: "Heading (first part)", name: heading, widget: string }
              - { label: "Heading (italic accent)", name: italicHeading, widget: string, required: false }
              - { label: "Body", name: body, widget: text }
              - { label: "CTA label", name: ctaLabel, widget: string }
              - { label: "CTA link", name: ctaHref, widget: string, hint: "Relative path ('connect/'), mailto:, or full https:// URL" }

  # --- WRITINGS (Words page entries) ----------------------------
  - name: writings
    label: "Writings (Words page)"
    label_singular: "Writing"
    folder: "src/content/writings"
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{author}}"
    sortable_fields: ['order', 'date', 'title', 'kind']
    fields:
