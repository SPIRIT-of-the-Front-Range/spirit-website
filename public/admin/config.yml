                default: 'duotone-creek'
              - { label: "Brightness (0.4–1.0)", name: brightness, widget: number, value_type: float, min: 0.4, max: 1.0, step: 0.05, default: 0.65 }

          - label: "Spreads"
            name: spreads
            widget: object
            fields:

              - label: "Four Ways spread"
                name: fourWays
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string, default: "Four Ways" }
                  - { label: "Primary marginalia (with N° 01 badge)", name: marginaliaPrimary, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Secondary marginalia", name: marginaliaSecondary, widget: markdown, minimal: true, buttons: ['bold', 'italic', 'link'] }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Subheading (italic line)", name: subheading, widget: string }
                  - label: "Cards (exactly four)"
                    name: cards
                    widget: list
                    min: 4
                    max: 4
                    fields:
                      - { label: "Number", name: number, widget: string, hint: "e.g. '01'" }
                      - label: "Accent color"
                        name: color
                        widget: select
                        options: ['clay', 'creek', 'sage', 'grass']
                      - { label: "Eyebrow", name: eyebrow, widget: string }
                      - { label: "Title", name: title, widget: string }
                      - { label: "Body", name: body, widget: text }
                      - { label: "CTA label", name: ctaLabel, widget: string }
                      - { label: "CTA link", name: ctaHref, widget: string, hint: "Relative path ('programs/'), mailto: link, or full https:// URL" }

              - label: "Newsletter spread"
                name: newsletter
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string, default: "Newsletter" }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Body", name: body, widget: text }
                  - { label: "Form action URL", name: formAction, widget: string, hint: "Where the form posts to (Formspree, ConvertKit, etc.)" }
                  - { label: "Form eyebrow", name: formEyebrow, widget: string, default: "★ Subscribe" }
                  - { label: "Submit button label", name: submitLabel, widget: string, default: "★ Subscribe" }
                  - { label: "Footnote", name: footnote, widget: string }

      # --- DONATE page --------------------------------------------
      - name: donate
        label: "Donate"
        file: "src/content/pages/donate.md"
        fields:
          - { label: "SEO", name: seo, widget: object, collapsed: true, fields: [
