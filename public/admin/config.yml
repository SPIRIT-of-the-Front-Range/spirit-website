                      - { label: "Tier label", name: tier, widget: string }
                      - { label: "Title", name: title, widget: string }
                      - { label: "Body", name: body, widget: text }

              - label: "Contribute spread"
                name: contribute
                widget: object
                collapsed: true
                fields:
                  - { label: "Section label", name: sectionLabel, widget: string }
                  - { label: "Eyebrow", name: eyebrow, widget: string }
                  - { label: "Heading (first part)", name: heading, widget: string }
                  - { label: "Heading (italic accent)", name: italicHeading, widget: string }
                  - { label: "Heading tail", name: headingTail, widget: string, required: false }
                  - { label: "Donate button label", name: donateCtaLabel, widget: string }
                  - { label: "Fallback eyebrow (when Every.org not ready)", name: fallbackEyebrow, widget: string }
                  - { label: "Fallback heading", name: fallbackHeading, widget: string }
